<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match - Kids Kingdom</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            min-height:100vh;
            background:linear-gradient(135deg,#6a11cb,#2575fc);
            display:flex;
            flex-direction:column;
            align-items:center;
            color:white;
        }

        h1{
            margin:30px 0;
            font-size:3rem;
        }

        .stats{
            font-size:1.2rem;
            margin-bottom:20px;
        }

        .game-board{
            display:grid;
            grid-template-columns:repeat(4,120px);
            gap:15px;
            margin-bottom:30px;
        }

        .card{
            width:120px;
            height:120px;
            background:white;
            border-radius:15px;
            display:flex;
            justify-content:center;
            align-items:center;
            font-size:3rem;
            cursor:pointer;
            color:transparent;
            transition:0.3s;
        }

        .card.flip{
            color:black;
            transform:rotateY(180deg);
        }

        .card.matched{
            background:#7CFC00;
            color:black;
        }

        button{
            padding:12px 25px;
            border:none;
            border-radius:30px;
            background:#ff4081;
            color:white;
            cursor:pointer;
            font-size:1rem;
        }

        button:hover{
            opacity:0.9;
        }

        @media(max-width:600px){
            .game-board{
                grid-template-columns:repeat(4,70px);
                gap:10px;
            }

            .card{
                width:70px;
                height:70px;
                font-size:2rem;
            }
        }
    </style>
</head>
<body>

    <h1>🧠 Memory Match</h1>

    <div class="stats">
        Moves: <span id="moves">0</span>
    </div>

    <div class="game-board" id="board"></div>

    <button onclick="startGame()">Restart Game</button>

    <script>
        const emojis = [
            "🐶","🐶",
            "🐱","🐱",
            "🐼","🐼",
            "🐰","🐰",
            "🦊","🦊",
            "🐸","🐸",
            "🐵","🐵",
            "🐨","🐨"
        ];

        let firstCard = null;
        let secondCard = null;
        let lockBoard = false;
        let moves = 0;

        const board = document.getElementById("board");
        const movesDisplay = document.getElementById("moves");

        function shuffle(array){
            return array.sort(() => Math.random() - 0.5);
        }

        function startGame(){

            board.innerHTML = "";
            firstCard = null;
            secondCard = null;
            lockBoard = false;
            moves = 0;

            movesDisplay.textContent = moves;

            const shuffled = shuffle([...emojis]);

            shuffled.forEach(emoji => {

                const card = document.createElement("div");
                card.classList.add("card");
                card.dataset.emoji = emoji;
                card.textContent = emoji;

                card.addEventListener("click", flipCard);

                board.appendChild(card);

            });
        }

        function flipCard(){

            if(lockBoard) return;
            if(this === firstCard) return;

            this.classList.add("flip");

            if(!firstCard){
                firstCard = this;
                return;
            }

            secondCard = this;
            moves++;
            movesDisplay.textContent = moves;

            checkMatch();
        }

        function checkMatch(){

            const match =
                firstCard.dataset.emoji ===
                secondCard.dataset.emoji;

            if(match){

                firstCard.classList.add("matched");
                secondCard.classList.add("matched");

                resetBoard();

                checkWin();

            }else{

                lockBoard = true;

                setTimeout(() => {

                    firstCard.classList.remove("flip");
                    secondCard.classList.remove("flip");

                    resetBoard();

                },1000);
            }
        }

        function resetBoard(){
            firstCard = null;
            secondCard = null;
            lockBoard = false;
        }

        function checkWin(){

            const matchedCards =
                document.querySelectorAll(".matched");

            if(matchedCards.length === emojis.length){

                setTimeout(() => {
                    alert(
                        "🎉 Congratulations! You won in " +
                        moves +
                        " moves!"
                    );
                },300);
            }
        }

        startGame();
    </script>

</body>
</html>
